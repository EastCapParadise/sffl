<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SFFL | Seasons</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">
        <img src="assets/logo.png" alt="SFFL Logo" class="nav-logo" />
        <span class="nav-title">SFFL</span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="seasons.html" class="active">Seasons</a></li>
        <li><a href="owners.html">Owners</a></li>
        <li><a href="head-to-head.html">Head to Head</a></li>
        <li><a href="playoffs.html">Playoffs</a></li>
        <li><a href="records.html">Records</a></li>
      </ul>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <section class="page-header">
    <div class="container">
      <h1 class="page-title">Season Hub</h1>
      <p class="page-subtitle">Browse every season in SFFL history</p>
      <div class="season-selector">
        <label for="season-select" class="selector-label">Select Season</label>
        <select id="season-select" class="selector-dropdown">
          <!-- Filled by JavaScript -->
        </select>
      </div>
    </div>
  </section>

  <!-- CHAMPION CALLOUT -->
  <section class="section" id="champion-section">
    <div class="container">
      <div class="season-champion-card" id="season-champion">
        <!-- Filled by JavaScript -->
      </div>
    </div>
  </section>

  <!-- FINAL STANDINGS -->
  <section class="section section-dark">
    <div class="container">
      <h2 class="section-title">Final Standings</h2>
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Owner</th>
              <th>W</th>
              <th>L</th>
              <th>T</th>
              <th>Points For</th>
              <th>Points Against</th>
              <th>PPG</th>
              <th>Playoffs</th>
            </tr>
          </thead>
          <tbody id="season-standings-body">
            <!-- Filled by JavaScript -->
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- PLAYOFF RESULTS -->
  <section class="section">
    <div class="container">
      <h2 class="section-title">Playoff Results</h2>
      <div id="playoff-results">
        <!-- Filled by JavaScript -->
      </div>
    </div>
  </section>

  <!-- WEEK BY WEEK -->
  <section class="section section-dark">
    <div class="container">
      <h2 class="section-title">Week by Week</h2>
      <div class="week-selector-row">
        <label for="week-select" class="selector-label">Select Week</label>
        <select id="week-select" class="selector-dropdown selector-small">
          <!-- Filled by JavaScript -->
        </select>
      </div>
      <div id="week-matchups" class="matchups-grid">
        <!-- Filled by JavaScript -->
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>Strickland Fantasy Football League &nbsp;|&nbsp; Est. 2013</p>
      <p class="footer-sub">Last updated: <span id="last-updated"></span></p>
    </div>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/seasons.js"></script>

</body>
</html>
